name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: altai_2026/package-lock.json

      - name: Install dependencies
        working-directory: altai_2026
        run: npm ci

      - name: Test
        working-directory: altai_2026
        run: npm test

      - name: Build Altai story
        working-directory: altai_2026
        env:
          VITE_YANDEX_MAPS_API_KEY: ${{ secrets.YANDEX_MAPS_API_KEY }}
        run: npm run build

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site/altai_2026
          cp index.html CNAME _site/
          cp -R altai_2026/dist/. _site/altai_2026/
          test -f _site/altai_2026/index.html
          test -d _site/altai_2026/assets

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
